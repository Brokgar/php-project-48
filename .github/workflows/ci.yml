name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.2', '8.3']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: xdebug

      - name: Install dependencies (create project)
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run PHP_CodeSniffer (lint)
        run: composer lint

      - name: Run PHPStan
        run: composer phpstan

      - name: Run tests with coverage reports
        run: vendor/bin/phpunit --coverage-clover build/coverage/clover.xml --log-junit build/logs/junit.xml

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-php-${{ matrix.php-version }}
          path: |
            build/coverage/clover.xml
            build/logs/junit.xml
